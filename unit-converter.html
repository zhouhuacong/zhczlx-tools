<style>
/* ===== LANGUAGE SWITCHER ===== */
.lang-switcher { position:relative; margin-left:auto; }
.lang-btn { background:none; border:1px solid var(--border-color-strong); padding:6px 12px; border-radius:var(--radius-md); color:var(--text-secondary); font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:4px; transition:all var(--transition-fast); font-family:var(--font-sans); }
.lang-btn:hover { color:var(--text-primary); background:var(--bg-hover); }
.lang-dropdown { position:absolute; top:100%; right:0; margin-top:4px; background:var(--bg-card); border:1px solid var(--border-color-strong); border-radius:var(--radius-md); box-shadow:var(--shadow-md); min-width:160px; z-index:200; display:none; overflow:hidden; }
.lang-dropdown.open { display:block; }
.lang-dropdown button { display:block; width:100%; padding:10px 16px; border:none; background:transparent; color:var(--text-primary); font-size:14px; text-align:left; cursor:pointer; transition:background var(--transition-fast); font-family:var(--font-sans); }
.lang-dropdown button:hover { background:var(--bg-hover); }
.lang-dropdown button.active { background:var(--accent-light); color:var(--accent); font-weight:600; }

.converter-tabs { display:flex; gap:4px; margin-bottom:20px; padding:4px; background:var(--bg-secondary); border-radius:var(--radius-md); flex-wrap:wrap; }
.converter-tab { padding:8px 16px; border:none; background:transparent; color:var(--text-secondary); font-family:var(--font-sans); font-size:13px; font-weight:500; cursor:pointer; border-radius:var(--radius-sm); transition:all var(--transition-fast); }
.converter-tab:hover { color:var(--text-primary); }
.converter-tab.active { background:var(--bg-primary); color:var(--text-primary); box-shadow:var(--shadow-sm); }
.panel-body { display:flex; align-items:center; gap:12px; }
.panel-body .side { flex:1; display:flex; flex-direction:column; gap:8px; }
.panel-body .side label { font-size:12px; font-weight:600; color:var(--text-secondary); }
.panel-body select { width:100%; padding:9px 12px; background:var(--bg-input); border:1px solid var(--border-color-strong); border-radius:var(--radius-md); color:var(--text-primary); font-size:14px; outline:none; cursor:pointer; font-family:var(--font-sans); }
.panel-body select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
.panel-body input[type="number"] { width:100%; padding:12px 14px; background:var(--bg-input); border:1px solid var(--border-color-strong); border-radius:var(--radius-md); color:var(--text-primary); font-size:18px; font-weight:600; outline:none; font-family:var(--font-sans); -moz-appearance:textfield; }
.panel-body input[type="number"]:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
.panel-body input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; }
.panel-body .swap-btn { flex-shrink:0; width:40px; height:40px; border-radius:50%; border:1px solid var(--border-color-strong); background:var(--bg-input); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text-secondary); transition:all var(--transition-fast); margin-top:22px; }
.panel-body .swap-btn:hover { background:var(--bg-hover); color:var(--accent); transform:rotate(180deg); }
.result-row { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:var(--radius-md); cursor:pointer; margin-top:12px; }
.result-row:hover { border-color:var(--accent); }
.result-value { font-size:22px; font-weight:700; color:var(--accent); font-family:var(--font-mono); }
.result-unit { font-size:14px; color:var(--text-secondary); }
.converter-panel { display:none; }
.converter-panel.active { display:block; }
.formula { font-size:12px; color:var(--text-tertiary); margin-top:8px; font-family:var(--font-mono); }
.quick-values { display:flex; gap:4px; margin-top:8px; flex-wrap:wrap; }
.quick-values button { padding:4px 10px; border:1px solid var(--border-color); background:var(--bg-secondary); color:var(--text-secondary); font-size:12px; border-radius:var(--radius-sm); cursor:pointer; transition:all var(--transition-fast); font-family:var(--font-sans); }
.quick-values button:hover { border-color:var(--accent); color:var(--accent); }
@media (max-width:600px) { .panel-body { flex-direction:column; } .panel-body .swap-btn { margin-top:0; transform:rotate(90deg); } .panel-body .swap-btn:hover { transform:rotate(270deg); } }
</style>
</head>
<body>

<script>
(function() {
  'use strict';
  var $ = function(id) { return document.getElementById(id); };
  var toast = $('toast');
  var tabsEl = $('tabs');
  var panelsEl = $('panels');

  var CATS = {
    length: { label: '📏 Length', units: ['mm','cm','m','km','inch','foot','yard','mile'] },
    mass: { label: '⚖️ Weight', units: ['mg','g','kg','ton','lb','oz'] },
    temperature: { label: '🌡️ Temperature', units: ['celsius','fahrenheit','kelvin'] },
    area: { label: '📐 Area', units: ['mm2','cm2','m2','km2','ha','acre','ft2'] },
    volume: { label: '🧪 Volume', units: ['ml','l','m3','gal','floz','cup'] }
  };

  var TO_BASE = {
    mm: function(v) { return v / 1000; },
    cm: function(v) { return v / 100; },
    m: function(v) { return v; },
    km: function(v) { return v * 1000; },
    inch: function(v) { return v * 0.0254; },
    foot: function(v) { return v * 0.3048; },
    yard: function(v) { return v * 0.9144; },
    mile: function(v) { return v * 1609.344; },
    mg: function(v) { return v / 1000000; },
    g: function(v) { return v / 1000; },
    kg: function(v) { return v; },
    ton: function(v) { return v * 1000; },
    lb: function(v) { return v * 0.45359237; },
    oz: function(v) { return v * 0.028349523125; },
    celsius: function(v) { return v; },
    fahrenheit: function(v) { return (v - 32) * 5/9; },
    kelvin: function(v) { return v - 273.15; },
    mm2: function(v) { return v / 1000000; },
    cm2: function(v) { return v / 10000; },
    m2: function(v) { return v; },
    km2: function(v) { return v * 1000000; },
    ha: function(v) { return v * 10000; },
    acre: function(v) { return v * 4046.8564224; },
    ft2: function(v) { return v * 0.09290304; },
    ml: function(v) { return v / 1000; },
    l: function(v) { return v; },
    m3: function(v) { return v * 1000; },
    gal: function(v) { return v * 3.785411784; },
    floz: function(v) { return v * 0.0295735295625; },
    cup: function(v) { return v * 0.2365882365; }
  };

  var FROM_BASE = {
    mm: function(v) { return v * 1000; },
    cm: function(v) { return v * 100; },
    m: function(v) { return v; },
    km: function(v) { return v / 1000; },
    inch: function(v) { return v / 0.0254; },
    foot: function(v) { return v / 0.3048; },
    yard: function(v) { return v / 0.9144; },
    mile: function(v) { return v / 1609.344; },
    mg: function(v) { return v * 1000000; },
    g: function(v) { return v * 1000; },
    kg: function(v) { return v; },
    ton: function(v) { return v / 1000; },
    lb: function(v) { return v / 0.45359237; },
    oz: function(v) { return v / 0.028349523125; },
    celsius: function(v) { return v; },
    fahrenheit: function(v) { return v * 9/5 + 32; },
    kelvin: function(v) { return v + 273.15; },
    mm2: function(v) { return v * 1000000; },
    cm2: function(v) { return v * 10000; },
    m2: function(v) { return v; },
    km2: function(v) { return v / 1000000; },
    ha: function(v) { return v / 10000; },
    acre: function(v) { return v / 4046.8564224; },
    ft2: function(v) { return v / 0.09290304; },
    ml: function(v) { return v * 1000; },
    l: function(v) { return v; },
    m3: function(v) { return v / 1000; },
    gal: function(v) { return v / 3.785411784; },
    floz: function(v) { return v / 0.0295735295625; },
    cup: function(v) { return v / 0.2365882365; }
  };

  var UNIT_LABELS = {
    mm:'Millimeter', cm:'Centimeter', m:'Meter', km:'Kilometer',
    inch:'Inch', foot:'Foot', yard:'Yard', mile:'Mile',
    mg:'Milligram', g:'Gram', kg:'Kilogram', ton:'Ton',
    lb:'Pound', oz:'Ounce',
    celsius:'°C', fahrenheit:'°F', kelvin:'K',
    mm2:'mm²', cm2:'cm²', m2:'m²', km2:'km²',
    ha:'Hectare', acre:'Acre', ft2:'ft²',
    ml:'Milliliter', l:'Liter', m3:'m³',
    gal:'Gallon', floz:'Fl Oz', cup:'Cup'
  };

  var state = {};

  function fmt(n) {
    if (Math.abs(n) >= 10000 || (Math.abs(n) < 0.001 && n !== 0)) return n.toExponential(4);
    if (Number.isInteger(n)) return n.toString();
    return parseFloat(n.toFixed(6)).toString();
  }

  function showToast(msg) {
    toast.textContent = msg; toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function() { toast.classList.remove('show'); }, 2000);
  }

  function copyText(text) {
    if (!text) return;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() { showToast('✅ Copied!'); })
        .catch(function() { fallbackCopy(text); });
    } else { fallbackCopy(text); }
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.left='-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('✅ Copied!'); } catch(e) {}
    document.body.removeChild(ta);
  }

  var catKeys = Object.keys(CATS);

  // Build tabs
  var tabHtml = '';
  for (var i = 0; i < catKeys.length; i++) {
    var cat = catKeys[i];

  }
  tabsEl.innerHTML = tabHtml;

  // Build panels
  var panelHtml = '';
  for (var i = 0; i < catKeys.length; i++) {
    var cat = catKeys[i];

      var u = units[j];
      var selFrom = (j === 0) ? ' selected' : '';
      var selTo = (j === Math.min(1, units.length - 1)) ? ' selected' : '';
      fromOpts += '<option value="' + u + '"' + selFrom + '>' + UNIT_LABELS[u] + ' (' + u + ')</option>';
      toOpts += '<option value="' + u + '"' + selTo + '>' + UNIT_LABELS[u] + ' (' + u + ')</option>';
    }

    state[cat] = { fromUnit: units[0], toUnit: units[Math.min(1, units.length - 1)], inputValue: '' };

    panelHtml += '<div class="converter-panel' + (i === 0 ? ' active' : '') + '" data-cat="' + cat + '">'
      + '<div class="panel-body">'
      + '  <div class="side">'
      + '    <label>From</label>'
      + '    <select class="from-unit" data-cat="' + cat + '">' + fromOpts + '</select>'
      + '    <input type="number" class="from-value" data-cat="' + cat + '" placeholder="Enter value" step="any">'
      + '    <div class="quick-values">'
      +       [1,10,100,1000].map(function(n) { return '<button data-val="' + n + '" data-cat="' + cat + '">' + n + '</button>'; }).join('')
      + '    </div>'
      + '  </div>'
      + '  <button class="swap-btn" data-cat="' + cat + '" title="Swap">⇄</button>'
      + '  <div class="side">'
      + '    <label>To</label>'
      + '    <select class="to-unit" data-cat="' + cat + '">' + toOpts + '</select>'
      + '    <div class="result-row" data-cat="' + cat + '">'
      + '      <span class="result-value" id="rv-' + cat + '">—</span>'
      + '      <span class="result-unit" id="ru-' + cat + '"></span>'
      + '    </div>'
      + '  </div>'
      + '</div>'
      + '<div class="formula" id="fm-' + cat + '">Enter a value to convert</div>'
      + '</div>';
  }
  panelsEl.innerHTML = panelHtml;

  // Conversion function
  function convert(cat) {
    var st = state[cat];
    var val = parseFloat(st.inputValue);
    if (isNaN(val) || st.inputValue === '') {
      document.getElementById('rv-' + cat).textContent = '—';
      document.getElementById('ru-' + cat).textContent = '';
      document.getElementById('fm-' + cat).textContent = 'Enter a value to convert';
      return;
    }
    var base = TO_BASE[st.fromUnit](val);
    var result = FROM_BASE[st.toUnit](base);
    document.getElementById('rv-' + cat).textContent = fmt(result);
    document.getElementById('ru-' + cat).textContent = st.toUnit;
    var fromLabel = UNIT_LABELS[st.fromUnit];
    var toLabel = UNIT_LABELS[st.toUnit];
    var rate = FROM_BASE[st.toUnit](TO_BASE[st.fromUnit](1));
    document.getElementById('fm-' + cat).innerHTML = '1 ' + fromLabel + ' (' + st.fromUnit + ') = ' + fmt(rate) + ' ' + toLabel + ' (' + st.toUnit + ')';
  }

  // Bind events
  document.addEventListener('change', function(e) {
    if (e.target.classList.contains('from-unit') || e.target.classList.contains('to-unit')) {
      var cat = e.target.getAttribute('data-cat');
      if (e.target.classList.contains('from-unit')) state[cat].fromUnit = e.target.value;
      else state[cat].toUnit = e.target.value;
      convert(cat);
    }
  });

  document.addEventListener('input', function(e) {
    if (e.target.classList.contains('from-value')) {
      var cat = e.target.getAttribute('data-cat');
      state[cat].inputValue = e.target.value;
      convert(cat);
    }
  });

  document.addEventListener('click', function(e) {
    // Tab switch
    if (e.target.classList.contains('converter-tab')) {
      document.querySelectorAll('.converter-tab').forEach(function(t) { t.classList.remove('active'); });
      e.target.classList.add('active');
      document.querySelectorAll('.converter-panel').forEach(function(p) { p.classList.remove('active'); });
      var panel = document.querySelector('.converter-panel[data-cat="' + e.target.getAttribute('data-cat') + '"]');
      if (panel) panel.classList.add('active');
    }
    // Swap
    if (e.target.classList.contains('swap-btn')) {
      var cat = e.target.getAttribute('data-cat');
      var from = document.querySelector('.from-unit[data-cat="' + cat + '"]');
      var to = document.querySelector('.to-unit[data-cat="' + cat + '"]');
      var tmp = from.value; from.value = to.value; to.value = tmp;
      state[cat].fromUnit = from.value;
      state[cat].toUnit = to.value;
      convert(cat);
    }
    // Quick value
    if (e.target.tagName === 'BUTTON' && e.target.getAttribute('data-val')) {
      var cat = e.target.getAttribute('data-cat');
      var val = e.target.getAttribute('data-val');
      var input = document.querySelector('.from-value[data-cat="' + cat + '"]');
      if (input) { input.value = val; state[cat].inputValue = val; convert(cat); }
    }
    // Copy result
    var rv = e.target.closest('.result-row');
    if (rv) {
      var cat = rv.getAttribute('data-cat');
      var val = document.getElementById('rv-' + cat).textContent;
      var unit = document.getElementById('ru-' + cat).textContent;
      if (val && val !== '—') copyText(val + ' ' + unit);
    }
  });

  // Init: convert length with default 1
  state.length.inputValue = '1';
  var lenInput = document.querySelector('.from-value[data-cat="length"]');
  if (lenInput) { lenInput.value = '1'; convert('length'); }

  // Theme
  // ===== I18N =====
  var LANG = {
    en: { catLength:'📏 Length', catMass:'⚖️ Weight', catTemperature:'🌡️ Temperature', catArea:'📐 Area', catVolume:'🧪 Volume', fromLabel:'From', toLabel:'To', placeholder:'Enter value', formula:'Enter a value to convert', copyToast:'✅ Copied!', swapTitle:'Swap', pageTitle:'Unit Converter — Hyrule Toolbox', siteName:'Hyrule Toolbox', navHome:'Home', navConverter:'Unit Converter', breadcrumb:'Unit Converter', heading:'📏 Unit Converter', desc:'Length, Weight, Temperature, Area, Volume — real-time conversion.', hint:'💡 Click result to copy', footer:'Hyrule Toolbox · Unit Converter', footerCopy:'© 2026 Hyrule Toolbox', themeAria:'Toggle theme' },
    zh: { catLength:'📏 长度', catMass:'⚖️ 重量', catTemperature:'🌡️ 温度', catArea:'📐 面积', catVolume:'🧪 体积', fromLabel:'从', toLabel:'到', placeholder:'输入数值', formula:'输入数值开始换算', copyToast:'✅ 已复制!', swapTitle:'交换', pageTitle:'单位换算 — 海拉鲁工具箱', siteName:'海拉鲁工具箱', navHome:'首页', navConverter:'单位换算', breadcrumb:'单位换算', heading:'📏 单位换算', desc:'长度、重量、温度、面积、体积 — 实时换算。', hint:'💡 点击结果复制', footer:'海拉鲁工具箱 · 单位换算', footerCopy:'© 2026 海拉鲁工具箱', themeAria:'切换主题' },
    ja: { catLength:'📏 長さ', catMass:'⚖️ 重さ', catTemperature:'🌡️ 温度', catArea:'📐 面積', catVolume:'🧪 体積', fromLabel:'元の単位', toLabel:'変換先', placeholder:'値を入力', formula:'値を入力して変換', copyToast:'✅ コピーしました!', swapTitle:'交換', pageTitle:'単位変換 — Hyrule Toolbox', siteName:'Hyrule Toolbox', navHome:'ホーム', navConverter:'単位変換', breadcrumb:'単位変換', heading:'📏 単位変換', desc:'長さ、重さ、温度、面積、体積 — リアルタイム変換。', hint:'💡 結果をクリックしてコピー', footer:'Hyrule Toolbox · 単位変換', footerCopy:'© 2026 Hyrule Toolbox', themeAria:'テーマ切替' },
    ko: { catLength:'📏 길이', catMass:'⚖️ 무게', catTemperature:'🌡️ 온도', catArea:'📐 면적', catVolume:'🧪 부피', fromLabel:'시작', toLabel:'도착', placeholder:'값 입력', formula:'값을 입력하여 변환', copyToast:'✅ 복사됨!', swapTitle:'교환', pageTitle:'단위 변환 — Hyrule Toolbox', siteName:'Hyrule Toolbox', navHome:'홈', navConverter:'단위 변환', breadcrumb:'단위 변환', heading:'📏 단위 변환', desc:'길이, 무게, 온도, 면적, 부피 — 실시간 변환.', hint:'💡 결과를 클릭하여 복사', footer:'Hyrule Toolbox · 단위 변환', footerCopy:'© 2026 Hyrule Toolbox', themeAria:'테마 전환' },
    fr: { catLength:'📏 Longueur', catMass:'⚖️ Poids', catTemperature:'🌡️ Température', catArea:'📐 Surface', catVolume:'🧪 Volume', fromLabel:'De', toLabel:'À', placeholder:'Entrez la valeur', formula:'Entrez une valeur', copyToast:'✅ Copié!', swapTitle:'Échanger', pageTitle:'Convertisseur d\'unités — Hyrule Toolbox', siteName:'Hyrule Toolbox', navHome:'Accueil', navConverter:'Convertisseur', breadcrumb:'Convertisseur', heading:'📏 Convertisseur', desc:'Longueur, Poids, Température, Surface, Volume — conversion en temps réel.', hint:'💡 Cliquez pour copier', footer:'Hyrule Toolbox · Convertisseur', footerCopy:'© 2026 Hyrule Toolbox', themeAria:'Changer le thème' },
    de: { catLength:'📏 Länge', catMass:'⚖️ Gewicht', catTemperature:'🌡️ Temperatur', catArea:'📐 Fläche', catVolume:'🧪 Volumen', fromLabel:'Von', toLabel:'Nach', placeholder:'Wert eingeben', formula:'Wert eingeben', copyToast:'✅ Kopiert!', swapTitle:'Tauschen', pageTitle:'Einheitenumrechner — Hyrule Toolbox', siteName:'Hyrule Toolbox', navHome:'Start', navConverter:'Umrechner', breadcrumb:'Umrechner', heading:'📏 Umrechner', desc:'Länge, Gewicht, Temperatur, Fläche, Volumen — Echtzeit-Umrechnung.', hint:'💡 Klicken zum Kopieren', footer:'Hyrule Toolbox · Umrechner', footerCopy:'© 2026 Hyrule Toolbox', themeAria:'Design wechseln' },
  };

  var langDropdown = $('langDropdown');
  var currentLang = 'en';
  try { var saved = localStorage.getItem('unit-lang'); if (saved) currentLang = saved; } catch(e) {}

    langBtn.textContent = '🌐 ' + lang.toUpperCase();

    // Update tab labels
    var tabBtns = document.querySelectorAll('.converter-tab');
    var keys = Object.keys(CATS);
    for (var i = 0; i < tabBtns.length; i++) {
      var cat = tabBtns[i].getAttribute('data-cat');
      var key = 'cat' + cat.charAt(0).toUpperCase() + cat.slice(1);
      tabBtns[i].textContent = t[key] || CATS[cat].label;
    }
    // Update "From/To" labels
    var labels = document.querySelectorAll('.side label');
    if (labels[0]) labels[0].textContent = t.fromLabel;
    if (labels[1]) labels[1].textContent = t.toLabel;
    // Page title, heading, description
    document.title = t.pageTitle;
    var h1 = document.querySelector('h1'); if (h1) h1.textContent = t.heading;
    var desc = document.querySelector('.tool-header p'); if (desc) desc.textContent = t.desc;
    var bc = document.querySelector('.breadcrumb span:last-child'); if (bc) bc.textContent = t.breadcrumb;
    var navA = document.querySelector('.header-nav a:last-child'); if (navA) navA.textContent = t.navConverter;
    var logo = document.querySelector('.header-logo span:last-child'); if (logo) logo.textContent = t.siteName;
    var hint = document.querySelector('.tool-footer .hint'); if (hint) hint.textContent = t.hint;
    var footers = document.querySelectorAll('.site-footer span, .site-footer a');
    for (var i = 0; i < footers.length; i++) {
      if (footers[i].getAttribute('href') === '/') footers[i].textContent = t.navHome;
    }
    var ttA = document.getElementById('themeToggle');
    if (ttA) ttA.setAttribute('aria-label', t.themeAria);
    // Placeholders
    var inputs = document.querySelectorAll('.from-value');
    for (var i = 0; i < inputs.length; i++) inputs[i].placeholder = t.placeholder;
    // Formula hints
    for (var i = 0; i < keys.length; i++) {
      var fm = document.getElementById('fm-' + keys[i]);
      if (fm && fm.textContent.indexOf('=') === -1 && fm.textContent.indexOf('→') === -1) {
        fm.textContent = t.formula;
      }
    }
    // Swap button titles
    var swaps = document.querySelectorAll('.swap-btn');
    for (var i = 0; i < swaps.length; i++) swaps[i].title = t.swapTitle;

    try { localStorage.setItem('unit-lang', lang); } catch(e) {}
  }
  langBtn.addEventListener('click', function(e) { e.stopPropagation(); langDropdown.classList.toggle('open'); });
  document.addEventListener('click', function() { langDropdown.classList.remove('open'); });
  var langOpts = langDropdown.querySelectorAll('button');
  for (var i = 0; i < langOpts.length; i++) {
    (function(btn) { btn.addEventListener('click', function() { applyLang(btn.getAttribute('data-lang')); langDropdown.classList.remove('open'); }); })(langOpts[i]);
  }

  applyLang(currentLang);

  var tt = $('themeToggle');
  var isDark = (function() { var s = localStorage.getItem('unit-theme'); return s ? s === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches; })();
  (function apply(d) {
    isDark = d; document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
    tt.textContent = d ? '☀️' : '🌙';
    try { localStorage.setItem('unit-theme', d ? 'dark' : 'light'); } catch(e) {}
  })(isDark);
  tt.addEventListener('click', function() { apply(!isDark); });
})();
</script>
</body>
</html>
